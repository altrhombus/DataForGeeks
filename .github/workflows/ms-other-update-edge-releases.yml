name: ms-other-update-edge-releases (Update)
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync
      - name: Run scraper
        run: uv run python run.py edge-releases
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          branch-token: ${{ steps.generate-token.outputs.token }}
          commit-message: Refresh edge-releases.json with latest Edge stable channel releases
          branch: au/ms-other-update-edge-releases
          delete-branch: true
          title: Refresh Edge stable channel releases
      - name: Merge Pull Request
        if: steps.cpr.outputs.pull-request-url != ''
        run: gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      - name: Check outputs
        if: steps.cpr.outputs.pull-request-url != ''
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
