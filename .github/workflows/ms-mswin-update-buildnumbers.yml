name: ms-mswin-update-buildnumbers (Update)
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Run the PowerShell Script
        shell: pwsh
        run: ./scripts/ms/mswin/buildnumbers.ps1
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch-token: ${{ steps.generate-token.outputs.token }}
          commit-message: Refresh mswin buildnumbers.json with latest Windows OS build numbers
          branch: au/ms-mswin-update-buildnumbers
          delete-branch: true
          title: Refresh Windows OS build numbers
      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-url != ''
        run: |
          for i in 1 2 3; do
            gh pr merge --squash --auto --delete-branch "${{ steps.cpr.outputs.pull-request-number }}" && break
            [ $i -lt 3 ] && echo "Merge attempt $i failed, retrying in 15s..." && sleep 15
          done
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      - name: Check outputs
        if: steps.cpr.outputs.pull-request-url != ''
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
