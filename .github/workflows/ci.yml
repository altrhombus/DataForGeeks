name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Type check (Pyright)
        run: uv run pyright

      - name: Tests
        run: uv run pytest
